ktor {
  application { modules = [ com.kotlinadmin.ApplicationKt.module ] }
  deployment { port = 0 }
}

app {
  name = "KotlinAdmin-Test"
  mode = "test"
  jwtSecret = "test-jwt-secret-that-is-at-least-32-characters-long"
  jwtExpireHours = 1
  sessionSecret = "test-session-secret-that-is-32ch"
  bcryptRounds = 4
}

database {
  # Default test = SQLite in-memory. Override env dipertahankan supaya job
  # DB Compatibility di CI benar-benar menjalankan migrasi terhadap MySQL &
  # PostgreSQL — tanpa ini, test selalu menabrak SQLite dan job itu hijau palsu.
  # SQLite file, bukan ":memory:" — tiap koneksi Exposed ke in-memory mendapat DB kosong
  # sendiri, sehingga migrasi Flyway tidak terlihat oleh query aplikasi.
  type = "sqlite"
  type = ${?DB_TYPE}
  host = "localhost"
  host = ${?DB_HOST}
  port = ${?DB_PORT}
  name = "kotlinadmin"
  name = ${?DB_DATABASE}
  name = ${?DB_NAME}

  # Kosong, bukan "jdbc:sqlite::memory:": url non-kosong akan menang atas DB_TYPE dan
  # membuat matrix DB di CI diam-diam tetap menabrak SQLite. Default in-memory kini
  # dinyatakan lewat type = "sqlite-memory" di atas.
  url = ""
  url = ${?DB_URL}
  driver = ""
  driver = ${?DB_DRIVER}
  user = ""
  user = ${?DB_USERNAME}
  user = ${?DB_USER}
  password = ""
  password = ${?DB_PASSWORD}
}

redis {
  host = "localhost"
  port = 6379
}
