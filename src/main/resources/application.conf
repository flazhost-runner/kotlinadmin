ktor {
  application {
    modules = [ com.kotlinadmin.ApplicationKt.module ]
  }
  deployment {
    port = 8002
    port = ${?APP_PORT}
  }
}

app {
  name = "KotlinAdmin"
  name = ${?APP_NAME}
  mode = "full"
  mode = ${?APP_MODE}
  jwtSecret = "change-me-in-production-min-32-chars"
  jwtSecret = ${?JWT_SECRET}
  jwtExpiresIn = "1h"
  jwtExpiresIn = ${?JWT_EXPIRES_IN}
  sessionSecret = "change-me-session-secret-min-32xx"
  sessionSecret = ${?SESSION_SECRET}
  sessionTtlHours = 6
  sessionTtlHours = ${?SESSION_TTL_HOURS}
  sessionDriver = "database"
  sessionDriver = ${?SESSION_DRIVER}
  bcryptRounds = 10
  bcryptRounds = ${?BCRYPT_ROUNDS}
  otpExpiryMinutes = 10
  otpExpiryMinutes = ${?OTP_EXPIRY_MINUTES}
  defaultPageSize = 10
  defaultPageSize = ${?DEFAULT_PAGE_SIZE}
}

storage {
  driver = "local"
  driver = ${?STORAGE_DRIVER}
  basePath = "uploads"
  basePath = ${?STORAGE_BASE_PATH}
  accessKeyId = ""
  accessKeyId = ${?STORAGE_ACCESS_KEY_ID}
  secretAccessKey = ""
  secretAccessKey = ${?STORAGE_SECRET_ACCESS_KEY}
  endpoint = ""
  endpoint = ${?STORAGE_ENDPOINT}
  bucket = ""
  bucket = ${?STORAGE_BUCKET}
  region = ""
  region = ${?STORAGE_REGION}
  ssl = true
  ssl = ${?STORAGE_SSL}
}

mail {
  host = ""
  host = ${?MAIL_HOST}
  port = 587
  port = ${?MAIL_PORT}
  secure = false
  secure = ${?MAIL_SECURE}
  username = ""
  username = ${?MAIL_USERNAME}
  password = ""
  password = ${?MAIL_PASSWORD}
  fromName = "KotlinAdmin"
  fromName = ${?MAIL_FROM_NAME}
  fromAddress = ""
  fromAddress = ${?MAIL_FROM_ADDRESS}
}

database {
  url = "jdbc:sqlite:./kotlinadmin.db"
  url = ${?DB_URL}
  driver = "org.sqlite.JDBC"
  driver = ${?DB_DRIVER}
  user = ""
  user = ${?DB_USERNAME}
  password = ""
  password = ${?DB_PASSWORD}
}

redis {
  url = "redis://127.0.0.1:6379"
  url = ${?REDIS_URL}
  host = "localhost"
  host = ${?REDIS_HOST}
  port = 6379
  port = ${?REDIS_PORT}
  password = ${?REDIS_PASSWORD}
}
